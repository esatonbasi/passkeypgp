<!DOCTYPE html>
<html>
<head>
    <title>Yubikey Passkey Demo</title>
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 8px 0; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button.secondary { background: #10b981; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0;">🛡️ Yubikey Login</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <button onclick="register()">Yeni Kayıt</button>
        <button onclick="login()" class="secondary">Giriş Yap</button>
    </div>

    <script>
        const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;

        async function register() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Kullanıcı adı girin");
            try {
                const res = await fetch(`/registration/options?username=${user}`);
                const options = await res.json();
                const attResp = await startRegistration(options);
                await fetch(`/registration/verify?username=${user}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(attResp)
                });
                alert("Kayıt Başarılı! Şimdi giriş yapabilirsiniz.");
            } catch (e) { alert("Kayıt hatası: " + e); }
        }

        async function login() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Kullanıcı adı girin");
            try {
                const res = await fetch(`/login/options?username=${user}`);
                const options = await res.json();
                const asseResp = await startAuthentication(options);
                const verifyRes = await fetch(`/login/verify?username=${user}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(asseResp)
                });
                const result = await verifyRes.json();
                if(result.redirect) window.location.href = result.redirect;
            } catch (e) { alert("Giriş başarısız!"); }
        }
    </script>
</body>
</html>
